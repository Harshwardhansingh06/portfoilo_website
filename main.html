<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Harsh Wardhan Singh</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    color: white;
    animation: fadePage 1s ease;
}

/* 💜 BACKGROUND */
body {
    background: linear-gradient(-45deg, #a18cd1, #c084fc, #d8b4fe, #fbc2eb);
    background-size: 400% 400%;
    animation: gradient 12s ease infinite;
}

@keyframes gradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* 🔮 SHAPES */
.shape {
    position: absolute;
    border-radius: 50%;
    filter: blur(40px);
    opacity: 0.6;
    animation: float 10s infinite alternate ease-in-out;
}

.shape1 {
    width: 200px;
    height: 200px;
    background: #ff6ec4;
    top: 20%;
    left: 10%;
}

.shape2 {
    width: 300px;
    height: 300px;
    background: #7873f5;
    bottom: 10%;
    right: 15%;
}

.shape3 {
    width: 150px;
    height: 150px;
    background: #42e695;
    top: 60%;
    left: 40%;
}

@keyframes float {
    from { transform: translateY(0px); }
    to { transform: translateY(-50px); }
}

/* 💎 CARD */
.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.1);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
}

/* ✨ FADE IN */
.fade-in {
    opacity: 0;
    transform: translateY(30px);
    animation: fadeIn 1.5s ease forwards;
}

@keyframes fadeIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* PAGE FADE */
@keyframes fadePage {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* LINKS */
.links a {
    display: inline-block;
    margin: 10px;
    padding: 12px 25px;
    border-radius: 30px;
    text-decoration: none;
    color: white;
    background: rgba(255,255,255,0.2);
    transition: 0.3s;
}

/* Hover Colors */
.links a:nth-child(1):hover {
    background: #ff2a6d;
    box-shadow: 0 0 20px #ff2a6d;
}

.links a:nth-child(2):hover {
    background: #6e7681;
    box-shadow: 0 0 20px #6e7681;
}

.links a:nth-child(3):hover {
    background: #0a66c2;
    box-shadow: 0 0 20px #0a66c2;
}
</style>
</head>

<body>

<div class="shape shape1"></div>
<div class="shape shape2"></div>
<div class="shape shape3"></div>

<div class="container">
    <div class="card fade-in">
        <h1>Harsh Wardhan Singh</h1>
        <p>B.Tech Computer Science Student 🚀</p>

        <div class="links">
            <a href="https://www.instagram.com/_harsh_rajput_06" target="_blank">Instagram</a>
            <a href="https://github.com/Harshwardhansingh06" target="_blank">GitHub</a>
            <a href="https://www.linkedin.com/in/harsh-wardhan-singh-64ba65386" target="_blank">LinkedIn</a>
        </div>
    </div>
</div>

</body>
</html>
