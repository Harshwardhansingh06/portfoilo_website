<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Welcome</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    color: white;
    overflow: hidden;
    animation: fadePage 1s ease;
}

/* 🌌 BACKGROUND */
body {
    background: linear-gradient(135deg, #141e30, #243b55);
}

/* 🔥 SHAPES */
.shape {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.6;
    animation: float 10s infinite alternate ease-in-out;
}

.shape1 {
    width: 300px;
    height: 300px;
    background: #ff416c;
    top: 10%;
    left: 10%;
}

.shape2 {
    width: 250px;
    height: 250px;
    background: #ff4b2b;
    bottom: 15%;
    right: 15%;
}

.shape3 {
    width: 200px;
    height: 200px;
    background: #1fa2ff;
    top: 60%;
    left: 50%;
}

@keyframes float {
    from { transform: translateY(0px); }
    to { transform: translateY(-40px); }
}

/* 💎 CARD */
.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.08);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 90%;
    max-width: 600px;
}

/* ✨ FADE IN */
.fade-in {
    opacity: 0;
    transform: translateY(30px);
    animation: fadeIn 1.5s ease forwards;
}

@keyframes fadeIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* PAGE FADE */
@keyframes fadePage {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* BUTTON */
button {
    margin-top: 25px;
    padding: 12px 30px;
    border-radius: 30px;
    border: none;
    background: #ff416c;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px #ff416c;
}
</style>
</head>

<body>

<div class="shape shape1"></div>
<div class="shape shape2"></div>
<div class="shape shape3"></div>

<div class="container">
    <div class="card fade-in">
        <h1>Welcome 👋</h1>
        <p>
            Hey there! I am a B.Tech CSE student,<br>
            and this is my portfolio website.<br><br>
            Step into my digital world 🚀
        </p>
        <button onclick="goToMain()">Enter</button>
    </div>
</div>

<script>
function goToMain() {
    window.location.href = "main.html";
}
</script>

</body>
</html>
